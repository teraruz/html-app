name: Git Workshop Demo

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'

env:
    SERVER_IP: '127.0.0.1'
    COMPANY_NAME: 'NTPLC'
    REPO_NAME: ${{ github.repository }}

jobs: 
  job-1:
    runs-on: ubuntu-latest
    environment: development
    env:
      PHONE: '0112223333'
    steps:
      - run: echo "Hello ${{ env.COMPANY_NAME }}"
      - run: echo "REPO NAME = ${{ env.REPO_NAME }}"
      - run: echo "SHA = ${{ github.actor }} ${{ env.PHONE }}"
      - run: echo "SERVER IP = ${{ vars.SERVER_IP_PRODUCTION }}"
  job-2:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "HELLO ${{ env.COMPANY_NAME }}"
      - run: echo "SERVER IP = ${{ env.SERVER_IP }}"
      - run: echo "SERVER IP = ${{ secrets.SERVER_IP_PRODUCTION }}"
      - run: echo " ${{ vars.APP_NAME }}"
      - run: echo " ${{ secrets.API_KEYS }}"



    